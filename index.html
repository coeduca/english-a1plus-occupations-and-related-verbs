<!DOCTYPE html>
<html lang="es" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="es">
<title>English A1+ | Occupations & Past Verbs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');

:root {
  --bg: #FFFBF0;
  --ink: #1a1a1a;
  --red: #FF2D55;
  --yellow: #FFD60A;
  --cyan: #00C6CF;
  --green: #39D353;
  --purple: #BF5AF2;
  --orange: #FF9F0A;
  --white: #FFFFFF;
  --shadow: 5px 5px 0 var(--ink);
  --shadow-sm: 3px 3px 0 var(--ink);
  --border: 3px solid var(--ink);
  --border-thick: 5px solid var(--ink);
  --font-display: 'Bangers', system-ui;
  --font-body: 'Nunito', system-ui;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
  overflow-x: hidden;
}

/* ─── HALFTONE BACKGROUND ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(var(--ink) 1px, transparent 1px);
  background-size: 20px 20px;
  opacity: 0.04;
  pointer-events: none;
  z-index: 0;
}

/* ─── LOGIN MODAL ─── */
#login-modal {
  position: fixed; inset: 0; z-index: 2000;
  background: repeating-linear-gradient(
    -45deg, var(--yellow) 0, var(--yellow) 12px,
    #fff 12px, #fff 24px
  );
  display: flex; align-items: center; justify-content: center;
}

.login-card {
  background: var(--white);
  border: var(--border-thick);
  box-shadow: 8px 8px 0 var(--ink);
  border-radius: 20px;
  padding: 40px 32px;
  width: min(95%, 440px);
  text-align: center;
  position: relative;
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn { from { transform: scale(0.7) rotate(-4deg); opacity: 0; } }

.login-card .card-top-bar {
  background: var(--red);
  position: absolute; top: 0; left: 0; right: 0;
  height: 12px; border-radius: 17px 17px 0 0;
}

.login-logo {
  font-family: var(--font-display);
  font-size: 52px; letter-spacing: 2px;
  color: var(--red);
  text-shadow: 4px 4px 0 var(--ink);
  line-height: 1;
  margin: 18px 0 4px;
}
.login-sub {
  font-size: 17px; font-weight: 900;
  color: var(--ink); margin-bottom: 24px;
}
.login-topic {
  background: var(--yellow);
  border: var(--border);
  border-radius: 40px;
  display: inline-block;
  padding: 6px 18px;
  font-size: 15px; font-weight: 900;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}

.field-wrap {
  position: relative; margin-bottom: 12px;
}
.field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 22px; pointer-events: none; }
.nie-input {
  width: 100%; padding: 14px 14px 14px 48px;
  border: var(--border); border-radius: 10px;
  font-family: var(--font-body); font-size: 18px; font-weight: 700;
  text-align: center; background: var(--bg); outline: none;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.nie-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,198,207,0.25); }

.btn {
  width: 100%; padding: 15px;
  font-family: var(--font-display); font-size: 26px; letter-spacing: 1px;
  border: var(--border); border-radius: 10px;
  cursor: pointer; transition: all 0.1s;
  box-shadow: var(--shadow); text-transform: uppercase;
  margin-top: 6px;
}
.btn:active { transform: translate(5px,5px); box-shadow: none; }
.btn-primary { background: var(--red); color: var(--white); }
.btn-alt    { background: var(--cyan); color: var(--ink); }
.btn-sm { width: auto; padding: 10px 20px; font-size: 18px; margin-top: 4px; }
.btn-pdf { background: var(--purple); color: var(--white); width: 100%; padding: 20px; font-family: var(--font-display); font-size: 28px; letter-spacing: 1px; border: var(--border); border-radius: 12px; cursor: pointer; box-shadow: var(--shadow); transition: all 0.1s; margin-bottom: 80px; }
.btn-pdf:active { transform: translate(5px,5px); box-shadow: none; }

.err-msg { color: var(--red); font-weight: 900; font-size: 15px; margin-top: 10px; display: none; }

/* ─── MAIN APP ─── */
#main-app { display: none; }

/* ─── HERO HEADER ─── */
.hero {
  background: var(--ink);
  color: var(--white);
  padding: 30px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(var(--yellow) 1.5px, transparent 1.5px);
  background-size: 18px 18px;
  opacity: 0.2;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 8vw, 64px);
  letter-spacing: 3px;
  line-height: 1;
  color: var(--yellow);
  text-shadow: 4px 4px 0 var(--red);
  position: relative;
}
.hero-sub {
  font-size: 16px; font-weight: 700; color: var(--cyan);
  margin-top: 8px; position: relative; letter-spacing: 1px;
}
.hero-chips {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-top: 14px; position: relative;
}
.chip {
  background: var(--red); color: var(--white);
  border: 2px solid var(--white);
  border-radius: 30px; padding: 5px 14px;
  font-size: 13px; font-weight: 900;
}

/* ─── SCORE BAR ─── */
.score-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 800;
  background: var(--ink); color: var(--white);
  display: flex; align-items: center; justify-content: center; gap: 20px;
  padding: 10px 20px; border-top: 3px solid var(--yellow);
  font-family: var(--font-display); font-size: 22px; letter-spacing: 1px;
}
.score-pill {
  background: var(--yellow); color: var(--ink);
  border-radius: 30px; padding: 4px 18px;
  font-size: 26px; border: 2px solid var(--white);
}

/* ─── CONTAINER & CARDS ─── */
.container {
  max-width: 980px; margin: 0 auto;
  padding: 24px 16px 160px;
}

.ex-card {
  border: var(--border-thick);
  border-radius: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 40px;
  position: relative;
  overflow: hidden;
  animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  animation-delay: calc(var(--i, 0) * 60ms);
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } }

.ex-card-header {
  padding: 18px 20px 14px;
  border-bottom: 3px solid var(--ink);
  display: flex; align-items: center; gap: 14px;
}
.ex-emoji { font-size: 40px; line-height: 1; flex-shrink: 0; }
.ex-title-wrap { flex: 1; }
.ex-num {
  font-family: var(--font-display);
  font-size: 13px; letter-spacing: 2px;
  color: var(--white);
  background: var(--ink);
  border-radius: 4px;
  display: inline-block;
  padding: 1px 10px;
  margin-bottom: 3px;
}
.ex-title {
  font-family: var(--font-display);
  font-size: 28px; letter-spacing: 1px;
  line-height: 1.1;
}
.ex-pts {
  font-family: var(--font-display);
  font-size: 22px;
  background: var(--yellow);
  border: 2px solid var(--ink);
  border-radius: 30px;
  padding: 4px 14px;
  white-space: nowrap;
  flex-shrink: 0;
}
.ex-card-body { padding: 20px; }

/* Card color variants */
.card-red    { background: #FFF0F3; }
.card-yellow { background: #FFFDE7; }
.card-cyan   { background: #E8FFFE; }
.card-green  { background: #F0FFF4; }
.card-purple { background: #F9F0FF; }
.card-orange { background: #FFF8F0; }
.card-pink   { background: #FFF0F8; }
.card-lime   { background: #F2FFE8; }
.card-blue   { background: #F0F4FF; }

.card-red    .ex-card-header { background: #FFD6E0; }
.card-yellow .ex-card-header { background: #FFF8C5; }
.card-cyan   .ex-card-header { background: #C8F7F9; }
.card-green  .ex-card-header { background: #C8F7DA; }
.card-purple .ex-card-header { background: #E8D5FF; }
.card-orange .ex-card-header { background: #FFE8C8; }
.card-pink   .ex-card-header { background: #FFD6F0; }
.card-lime   .ex-card-header { background: #DAFFC8; }
.card-blue   .ex-card-header { background: #D5E4FF; }

/* ─── SELECTS ─── */
select {
  padding: 8px 12px;
  border: 2px solid var(--ink); border-radius: 8px;
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  background: #fff; cursor: pointer; outline: none;
  box-shadow: var(--shadow-sm);
  transition: transform 0.1s;
}
select:active { transform: translate(3px,3px); box-shadow: none; }

/* ─── EX LIST ─── */
.ex-list { list-style: none; }
.ex-list li {
  display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
  background: rgba(255,255,255,0.8);
  border: 2px solid var(--ink); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 12px;
  font-size: 17px; font-weight: 700;
  transition: transform 0.15s;
}
.ex-list li:hover { transform: translateX(3px); }

/* ─── READING BOX ─── */
.reading-box {
  background: var(--white);
  border: 3px solid var(--ink);
  border-radius: 10px;
  padding: 18px 20px;
  font-size: 18px; font-weight: 700;
  font-style: italic;
  margin-bottom: 20px;
  box-shadow: inset 3px 3px 0 rgba(0,0,0,0.06);
  line-height: 1.6;
}

/* ─── WORD SEARCH ─── */
.ws-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.ws-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 3px;
  background: var(--ink);
  border: var(--border-thick);
  border-radius: 12px;
  padding: 8px;
  touch-action: none;
  width: min(100%, 420px);
  box-shadow: 6px 6px 0 var(--ink);
}
.ws-cell {
  aspect-ratio: 1;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: clamp(14px, 3.5vw, 22px);
  letter-spacing: 1px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.08s, transform 0.08s;
  position: relative;
  z-index: 1;
}
.ws-cell.trail {
  background: var(--yellow);
  transform: scale(1.12);
  z-index: 2;
}
.ws-cell.found {
  background: var(--cyan);
  color: var(--ink);
}
.ws-cell.found-anim {
  animation: cellPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
  background: var(--green);
}
@keyframes cellPop {
  0%   { transform: scale(1); background: var(--cyan); }
  40%  { transform: scale(1.25); background: var(--green); }
  100% { transform: scale(1); background: var(--green); }
}

.word-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.word-chip {
  padding: 7px 16px;
  border: 2px solid var(--ink);
  border-radius: 30px;
  font-weight: 900; font-size: 15px;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: all 0.25s;
}
.word-chip.found {
  background: var(--green); color: var(--white);
  text-decoration: line-through;
  transform: scale(0.93);
  box-shadow: none;
}

/* ─── DRAG & DROP ─── */
.drag-bank {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 16px; border: 2px dashed var(--ink);
  border-radius: 10px; background: rgba(255,255,255,0.5);
  justify-content: center; min-height: 60px;
  margin-bottom: 20px;
}
.draggable {
  padding: 10px 18px;
  background: var(--purple); color: var(--white);
  border: 2px solid var(--ink); border-radius: 8px;
  font-weight: 900; font-size: 17px;
  cursor: grab; box-shadow: var(--shadow-sm);
  touch-action: none; text-transform: uppercase;
  transition: transform 0.1s, box-shadow 0.1s;
}
.draggable:hover { transform: rotate(-2deg) scale(1.04); }

.dnd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 640px) { .dnd-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 420px) { .dnd-grid { grid-template-columns: 1fr; } }

.dnd-row {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border: 2px solid var(--ink);
  border-radius: 10px; padding: 10px 12px;
}
.dnd-label { font-weight: 900; font-size: 16px; color: var(--red); text-transform: uppercase; min-width: 80px; }
.dropzone {
  flex: 1; height: 44px;
  border: 2px dashed var(--ink); border-radius: 8px;
  background: #f5f5f5;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #aaa;
  transition: background 0.2s, border-color 0.2s;
}
.dropzone.over { border-color: var(--cyan); background: rgba(0,198,207,0.1); }
.dropzone.filled {
  background: var(--yellow);
  border: 2px solid var(--ink);
  color: var(--ink); font-weight: 900; text-transform: uppercase;
  box-shadow: inset 2px 2px 0 rgba(0,0,0,0.08);
  font-size: 15px;
}

/* ─── REORDER ─── */
.reorder-block { margin-bottom: 20px; }
.reorder-src {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 12px; border: 2px dashed rgba(0,0,0,0.25);
  border-radius: 10px; min-height: 50px; margin-bottom: 10px;
}
.reorder-zone {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 12px; border: 2px solid var(--ink);
  border-radius: 10px; min-height: 56px;
  background: rgba(255,255,255,0.7);
  transition: background 0.2s;
}
.reorder-zone.over { background: rgba(0,198,207,0.15); }
.reorder-drag {
  background: var(--orange); color: var(--ink);
  border: 2px solid var(--ink);
  border-radius: 8px; padding: 7px 14px;
  font-weight: 900; font-size: 16px;
  cursor: grab; touch-action: none;
  box-shadow: var(--shadow-sm);
}

/* ─── SCRAMBLE INPUT ─── */
.scramble-input {
  padding: 8px 12px; border: 2px solid var(--ink);
  border-radius: 8px; font-family: var(--font-body);
  font-size: 16px; font-weight: 900; text-align: center;
  text-transform: uppercase; width: 130px;
  background: #fff; outline: none; box-shadow: var(--shadow-sm);
}
.scramble-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(191,90,242,0.2); }

/* ─── XO GAME ─── */
.game-section {
  background: var(--ink) !important;
  color: var(--white);
}
.game-section .ex-card-header { background: #2a2a2a !important; border-color: #444; }
.game-section .ex-num { background: var(--yellow); color: var(--ink); }
.game-section .ex-title { color: var(--yellow); }
.game-section .ex-pts { background: var(--green); }

.xo-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.xo-info { text-align: center; font-weight: 700; font-size: 15px; color: #ccc; }

.xo-board {
  display: grid; grid-template-columns: repeat(3, 88px);
  gap: 6px;
  padding: 8px;
  background: #333;
  border: 3px solid #555;
  border-radius: 14px;
  box-shadow: 0 0 30px rgba(255,214,10,0.3);
}
.xo-cell {
  width: 88px; height: 88px;
  background: #1a1a1a;
  border: 2px solid #444;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 52px; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.xo-cell:hover:not(.taken) { background: #2a2a2a; transform: scale(1.05); }
.xo-cell.taken { cursor: default; }
.xo-cell.x-mark { color: var(--red); animation: markIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
.xo-cell.o-mark { color: var(--cyan); animation: markIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
.xo-cell.win-line { background: #333; box-shadow: inset 0 0 20px var(--yellow); }
@keyframes markIn { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1); } }

.xo-result {
  font-family: var(--font-display);
  font-size: 32px; letter-spacing: 1px;
  text-align: center;
  min-height: 44px;
}
.xo-result.won  { color: var(--green); }
.xo-result.lost { color: var(--red); }
.xo-result.draw { color: var(--yellow); }

.xo-reset { background: transparent; color: #ccc; border: 1px solid #555; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-family: var(--font-body); font-weight: 700; font-size: 14px; transition: all 0.2s; }
.xo-reset:hover { background: #333; color: var(--white); }

/* ─── RESPONSIVE ─── */
@media (max-width: 500px) {
  .xo-board { grid-template-columns: repeat(3, 76px); }
  .xo-cell { width: 76px; height: 76px; font-size: 44px; }
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-modal">
  <div class="login-card">
    <div class="card-top-bar"></div>
    <div class="login-logo">ENGLISH A1+</div>
    <div class="login-sub">🎓 Escuela COEDUCA — Sección A</div>
    <div class="login-topic">📚 Occupations &amp; Past Verbs</div>

    <div class="field-wrap">
      <span class="field-icon">🪪</span>
      <input class="nie-input" id="nie1" type="text" placeholder="Tu NIE" autocomplete="off">
    </div>

    <div id="partner-wrap" style="display:none;">
      <div class="field-wrap">
        <span class="field-icon">👥</span>
        <input class="nie-input" id="nie2" type="text" placeholder="NIE Compañero (opcional)" autocomplete="off">
      </div>
    </div>

    <button class="btn btn-alt btn-sm" id="btn-partner">➕ Agregar compañero</button>
    <button class="btn btn-primary" id="btn-login">¡ Ingresar !</button>
    <div class="err-msg" id="login-err">❌ NIE no encontrado en el sistema.</div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="main-app">
  <div class="hero">
    <div class="hero-title">OCCUPATIONS &amp; PAST VERBS</div>
    <div class="hero-sub">Complete todos los ejercicios y descarga tu calificación 🚀</div>
    <div class="hero-chips">
      <span class="chip">📝 9 Ejercicios</span>
      <span class="chip">🎮 Juego Bonus</span>
      <span class="chip">📄 PDF Automático</span>
    </div>
  </div>

  <div class="container" id="exs-container"></div>

  <div class="container" style="padding-top:0;">
    <button class="btn-pdf" id="btn-pdf">📄 Descargar PDF para Classroom</button>
  </div>
</div>

<div class="score-bar">
  <span>⚡ Puntos</span>
  <span class="score-pill" id="score-live">0</span>
  <span>/ 52</span>
  <span style="font-size:16px; color:#ccc; margin-left:10px;">🎮 Bonus: <span id="bonus-live">0</span></span>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="students.js"></script>
<script src="rigo.js"></script>
<rigo-mascot></rigo-mascot>

<script>
// ─── SECURITY ───
document.addEventListener('contextmenu', e => e.preventDefault());
['copy','cut','paste','selectstart'].forEach(ev =>
  document.addEventListener(ev, e => {
    if(!/INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) e.preventDefault();
  })
);

// ─── DATA ───
const POOLS = {
  A: {
    words: [
      {w:'TEACHER',r1:0,c1:0,r2:0,c2:6},{w:'DOCTOR',r1:2,c1:0,r2:2,c2:5},
      {w:'PILOT',r1:4,c1:0,r2:4,c2:4},{w:'NURSE',r1:6,c1:0,r2:6,c2:4},
      {w:'CHEF',r1:8,c1:0,r2:8,c2:3},{w:'POLICE',r1:0,c1:8,r2:5,c2:8},
      {w:'FARMER',r1:0,c1:9,r2:5,c2:9},{w:'DENTIST',r1:9,c1:0,r2:9,c2:6}
    ],
    grid: [
      ['T','E','A','C','H','E','R','X','P','F'],
      ['M','V','L','Q','W','Y','Z','A','O','A'],
      ['D','O','C','T','O','R','J','K','L','R'],
      ['S','T','H','P','M','V','L','N','I','M'],
      ['P','I','L','O','T','Y','E','F','C','E'],
      ['W','A','U','B','Z','M','D','O','E','R'],
      ['N','U','R','S','E','X','Y','A','B','T'],
      ['L','N','M','E','R','G','H','I','U','V'],
      ['C','H','E','F','E','T','W','X','Y','Z'],
      ['D','E','N','T','I','S','T','I','O','U']
    ],

let ST = {
  s1: null, s2: null, poolKey: 'A', pool: null,
  scores: {ex1:0,ex2:0,ex3:0,ex4:0,ex5:0,ex6:0,ex7:0,ex8:0,ex9:0},
  gamePoints: 0, gameStatus: 'pending',
  answers: {ex1:[],ex2:{},ex3:{},ex4:{},ex5:{},ex6:{},ex7:{},ex8:{},ex9:{}},
  xo: ['','','','','','','','','']
};
const SAVE_KEY = 'occ_ws_v5';

function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(ST)); recalc(); updateUI(); }
function loadSaved() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if(s) { ST = JSON.parse(s); return !!ST.s1; }
  } catch(e) {}
  return false;
}

function recalc() {
  const p = ST.pool || POOLS[ST.poolKey];
  const sc = {ex1:0,ex2:0,ex3:0,ex4:0,ex5:0,ex6:0,ex7:0,ex8:0,ex9:0};
  sc.ex1 = ST.answers.ex1.length;
  p.emojiMatch.forEach((_,i) => { if(ST.answers.ex2[i]===p.emojiMatch[i].ans) sc.ex2++; });
  p.verbs.forEach((_,i)     => { if(ST.answers.ex3[i]===p.verbs[i].p) sc.ex3++; });
  p.fill.forEach((_,i)      => { if(ST.answers.ex4[i]===p.fill[i].ans) sc.ex4++; });
  p.reorder.forEach((_,i)   => { if(ST.answers.ex5[i]?.join(' ')===p.reorder[i].ans) sc.ex5++; });
  p.duties.forEach((_,i)    => { if(ST.answers.ex6[i]===p.duties[i].ans) sc.ex6++; });
  p.mcq.forEach((_,i)       => { if(ST.answers.ex7[i]===p.mcq[i].ans) sc.ex7++; });
  p.tf.forEach((_,i)        => { if(ST.answers.ex8[i]===p.tf[i].ans) sc.ex8++; });
  p.scramble.forEach((_,i)  => { if((ST.answers.ex9[i]||'').toUpperCase()===p.scramble[i].ans) sc.ex9++; });
  ST.scores = sc;
}

function updateUI() {
  const tot = Object.values(ST.scores).reduce((a,b)=>a+b,0);
  document.getElementById('score-live').textContent = tot;
  document.getElementById('bonus-live').textContent = ST.gamePoints;
}

}

  const n1 = document.getElementById('nie1').value.trim();
  const n2 = document.getElementById('nie2').value.trim();

  err.style.display='none';

  ST.s1 = {nie:n1,...STUDENTS[n1]};

// ─── EX 1: WORD SEARCH ───
function renderWS(c) {
  const p = ST.pool;
  let inner = `<div class="ws-wrap"><div class="ws-grid" id="ws-grid">`;
  p.grid.forEach((row,r) => row.forEach((ch,col) => {
    inner += `<div class="ws-cell" data-r="${r}" data-c="${col}">${ch}</div>`;
  }));
  inner += `</div><div class="word-chips" id="ws-chips">`;
  p.words.forEach(w => {
    const found = ST.answers.ex1.includes(w.w);
    inner += `<div class="word-chip${found?' found':''}" id="chip-${w.w}">${w.w}</div>`;
  });
  inner += `</div></div>`;

  const el = card(CARD_COLORS[0],0,'🔍','1','Word Search','8', inner);
  c.appendChild(el);
  setupWS();
}

function setupWS() {
  const gridEl = document.getElementById('ws-grid');
  if(!gridEl) return;
  const p = ST.pool;
  let startCell = null;

  // Restore found cells
  ST.answers.ex1.forEach(wStr => {
    const wObj = p.words.find(w=>w.w===wStr);
    if(wObj) markFoundCells(wObj.r1,wObj.c1,wObj.r2,wObj.c2,false);
  });

  function cellAt(el) {
    if(!el?.classList.contains('ws-cell')) return null;
    return {r:+el.dataset.r, c:+el.dataset.c};
  }
  function cellFromPoint(x,y) {
    const el = document.elementFromPoint(x,y);
    return el?.classList.contains('ws-cell') ? el : null;
  }

  let trailCells = [];
  function clearTrail() { trailCells.forEach(el=>el.classList.remove('trail')); trailCells=[]; }

  function drawTrail(r1,c1,r2,c2) {
    clearTrail();
    let dr=Math.sign(r2-r1), dc=Math.sign(c2-c1);
    let dist=Math.max(Math.abs(r2-r1),Math.abs(c2-c1));
    for(let i=0;i<=dist;i++) {
      const el=document.querySelector(`.ws-cell[data-r="${r1+dr*i}"][data-c="${c1+dc*i}"]`);
      if(el && !el.classList.contains('found')) { el.classList.add('trail'); trailCells.push(el); }
    }
  }

  function onStart(e) {
    e.preventDefault();
    const pt = e.touches?e.touches[0]:e;
    const c = cellFromPoint(pt.clientX,pt.clientY);
    if(!c) return;
    startCell = {r:+c.dataset.r,col:+c.dataset.c};
    c.classList.add('trail'); trailCells=[c];
  }

  function onMove(e) {
    e.preventDefault();
    if(!startCell) return;
    const pt = e.touches?e.touches[0]:e;
    const c = cellFromPoint(pt.clientX,pt.clientY);
    if(!c) return;
    drawTrail(startCell.r,startCell.col,+c.dataset.r,+c.dataset.c);
  }

  function onEnd(e) {
    if(!startCell) return;
    const pt=(e.changedTouches?e.changedTouches[0]:e)||{clientX:0,clientY:0};
    const endEl=cellFromPoint(pt.clientX,pt.clientY);
    const r1=startCell.r,c1=startCell.col;
    startCell=null;
    clearTrail();
    if(!endEl) return;
    const r2=+endEl.dataset.r,c2=+endEl.dataset.c;
    const found=p.words.find(w=>
      (w.r1===r1&&w.c1===c1&&w.r2===r2&&w.c2===c2)||
      (w.r1===r2&&w.c1===c2&&w.r2===r1&&w.c2===c1)
    );
    if(found && !ST.answers.ex1.includes(found.w)) {
      ST.answers.ex1.push(found.w);
      markFoundCells(found.r1,found.c1,found.r2,found.c2,true);
      const chip=document.getElementById(`chip-${found.w}`);
      if(chip) chip.classList.add('found');
      onAnswer('ex1',true);
    }
  }

  gridEl.addEventListener('mousedown',onStart);
  gridEl.addEventListener('touchstart',onStart,{passive:false});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',onEnd);
  window.addEventListener('touchend',onEnd);
}

function markFoundCells(r1,c1,r2,c2,animate) {
  const dr=Math.sign(r2-r1),dc=Math.sign(c2-c1);
  const dist=Math.max(Math.abs(r2-r1),Math.abs(c2-c1));
  for(let i=0;i<=dist;i++){
    const el=document.querySelector(`.ws-cell[data-r="${r1+dr*i}"][data-c="${c1+dc*i}"]`);
    if(el){
      if(animate){
        el.classList.add('found-anim');
        setTimeout(()=>{el.classList.remove('found-anim');el.classList.add('found');},450);
      } else {
        el.classList.add('found');
      }
    }
  }
}

    if(!placed.has(v.p)) bank+=`<div class="draggable" data-val="${v.p}">${v.p}</div>`;
  });
  bank+=`</div>`;

  let grid=`<div class="dnd-grid">`;
  p.verbs.forEach((v,i)=>{
    const ans=ST.answers.ex3[i]||'';
    const filled=ans?'filled':'';
    grid+=`<div class="dnd-row">
      <div class="dnd-label">${v.pst}</div>
      <div class="dropzone ${filled}" data-idx="${i}" data-ans="${v.p}">
        <span>${ans||'aquí'}</span>
      </div>

  });
  grid+=`</div>`;

  const el=card(CARD_COLORS[2],2,'🔀','3','Present → Past','9',bank+grid);

// ─── DRAG & DROP ENGINE ───
function setupDnD(mode) {
  let dragEl=null,clone=null,offsetX=0,offsetY=0;
  const isReorder=mode==='reorder';

  function onStart(e) {
    const t=e.target.closest('.draggable');
    if(!t) return;
    if(isReorder && !t.classList.contains('reorder-drag')) return;
    if(!isReorder && t.classList.contains('reorder-drag')) return;
    e.preventDefault();
    dragEl=t;
    const pt=e.touches?e.touches[0]:e;
    const r=t.getBoundingClientRect();
    offsetX=pt.clientX-r.left; offsetY=pt.clientY-r.top;
    clone=t.cloneNode(true);
    clone.style.cssText=`position:fixed;z-index:99999;pointer-events:none;opacity:0.9;
      transform:rotate(-3deg) scale(1.1);transition:none;
      left:${r.left}px;top:${r.top}px;width:${r.width}px;`;
    document.body.appendChild(clone);
    t.style.opacity='0.3';
  }

  function onMove(e) {
    if(!clone) return;
    e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    clone.style.left=(pt.clientX-offsetX)+'px';
    clone.style.top=(pt.clientY-offsetY)+'px';
    // Auto-scroll
    if(pt.clientY<90) window.scrollBy(0,-14);
    else if(window.innerHeight-pt.clientY<90) window.scrollBy(0,14);
  }

  function onEnd(e) {
    if(!clone||!dragEl) return;
    const pt=e.changedTouches?e.changedTouches[0]:e;
    clone.remove(); clone=null;
    dragEl.style.opacity='1';

    dragEl.style.display='none';
    let target=document.elementFromPoint(pt.clientX,pt.clientY);
    dragEl.style.display='';

    if(isReorder) {
      const srcIdx=dragEl.closest('[data-idx]')?.dataset.idx;
      if(!srcIdx) { dragEl=null; return; }
      const zone=target?.closest('.reorder-zone');
      const src=target?.closest('.reorder-src');
      if(zone && zone.dataset.idx===srcIdx) {
        zone.appendChild(dragEl);
      } else {
        document.getElementById(`rsrc-${srcIdx}`)?.appendChild(dragEl);
      }
      const words=Array.from(document.getElementById(`rzone-${srcIdx}`)?.children||[]).map(c=>c.dataset.val);
      ST.answers.ex5[srcIdx]=words;
      onAnswer('ex5', words.join(' ')===ST.pool.reorder[+srcIdx].ans);
    } else {
      const dropEl=target?.closest('.dropzone');
      if(dropEl && !dropEl.classList.contains('filled')) {
        const val=dragEl.dataset.val;
        const idx=+dropEl.dataset.idx;
        const correct=dropEl.dataset.ans;
        dropEl.innerHTML=`<span>${val}</span>`;
        dropEl.classList.add('filled');
        dragEl.remove();
        ST.answers.ex3[idx]=val;
        onAnswer('ex3', val===correct);
      }
    }
    dragEl=null;
  }

  document.addEventListener('mousedown',onStart,{capture:false});
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchstart',onStart,{passive:false,capture:false});
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

// ─── XO GAME (AI minimax-lite) ───
function renderXOCard(c) {
  const body=`
    <div class="xo-wrap">
      <div class="xo-info">🤖 Juegas como X. ¡El CPU no es fácil de vencer!</div>
      <div class="xo-board" id="xo-board"></div>
      <div class="xo-result" id="xo-result"></div>
      <button class="xo-reset" id="xo-reset">↺ Reiniciar partida</button>
    </div>`;
  const el=card('game-section',9,'🎮','BONUS','Tic Tac Toe XO','extra',body);
  el.classList.add('game-section');
  c.appendChild(el);
  renderXOBoard();
  document.getElementById('xo-reset').addEventListener('click',()=>{
    if(ST.gameStatus!=='pending'){
      ST.xo=['','','','','','','','',''];
      ST.gameStatus='pending';
      ST.gamePoints=0;
      save();
      renderXOBoard();
      document.getElementById('xo-result').textContent='';
      document.getElementById('xo-result').className='xo-result';
    }
  });
}

function renderXOBoard() {
  const board=document.getElementById('xo-board');
  if(!board) return;
  board.innerHTML='';
  const wins=getWinLines();
  const winLine=wins.find(l=>ST.xo[l[0]]&&ST.xo[l[0]]===ST.xo[l[1]]&&ST.xo[l[0]]===ST.xo[l[2]])||null;
  ST.xo.forEach((v,i)=>{
    const cell=document.createElement('div');
    cell.className='xo-cell'+(v?' taken':'')+(v==='X'?' x-mark':v==='O'?' o-mark':'');
    if(winLine&&winLine.includes(i)) cell.classList.add('win-line');
    cell.textContent=v;
    cell.addEventListener('click',()=>xoPlay(i));
    board.appendChild(cell);
  });
  updateXOResult();
}

function getWinLines() {
  return[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
}

function checkWinner(board) {
  for(const l of getWinLines()) {
    if(board[l[0]]&&board[l[0]]===board[l[1]]&&board[l[0]]===board[l[2]]) return board[l[0]];
  }
  return board.includes('')?null:'draw';
}

// Minimax with depth limit so it's smart but not impossible
function minimax(board, depth, isMax, alpha, beta) {
  const w=checkWinner(board);
  if(w==='O') return 10-depth;
  if(w==='X') return depth-10;
  if(w==='draw'||depth>6) return 0;
  let best=isMax?-100:100;
  for(let i=0;i<9;i++){
    if(!board[i]){
      board[i]=isMax?'O':'X';
      const v=minimax(board,depth+1,!isMax,alpha,beta);
      board[i]='';
      if(isMax){ best=Math.max(best,v); alpha=Math.max(alpha,v); }
      else      { best=Math.min(best,v); beta=Math.min(beta,v); }
      if(beta<=alpha) break;
    }
  }
  return best;
}

function bestMove(board) {
  let best=-100, move=-1;
  for(let i=0;i<9;i++){
    if(!board[i]){
      board[i]='O';
      const v=minimax(board,0,false,-100,100);
      board[i]='';
      if(v>best){ best=v; move=i; }
    }
  }
  return move;
}

function xoPlay(idx) {
  if(ST.gameStatus!=='pending'||ST.xo[idx]) return;
  ST.xo[idx]='X';
  const w=checkWinner(ST.xo);
  if(w){ finishXO(w); renderXOBoard(); save(); return; }
  renderXOBoard();
  // CPU move after short delay
  setTimeout(()=>{
    const m=bestMove([...ST.xo]);
    if(m!==-1) ST.xo[m]='O';
    const w2=checkWinner(ST.xo);
    if(w2) finishXO(w2);
    renderXOBoard();
    save();
  }, 450);
}

function finishXO(w) {
  if(w==='X'){
    ST.gameStatus='won'; ST.gamePoints=1;
    window.rigo?.setEmotion('excited');
    window.rigo?.say('Felicidades, eres bueno en este juego, ten 1 punto extra',5000);
  } else if(w==='O'){
    ST.gameStatus='lost'; ST.gamePoints=0;
    window.rigo?.setEmotion('sad');
    window.rigo?.say('Oops, más suerte para la próxima.',5000);
  } else {
    ST.gameStatus='draw'; ST.gamePoints=0.5;
    window.rigo?.setEmotion('neutral');
    window.rigo?.say('Estamos a mano, ten 0.5 extra para tu nota',5000);
  }
  updateUI();
}

function updateXOResult() {
  const el=document.getElementById('xo-result');
  if(!el) return;
  if(ST.gameStatus==='won')  { el.className='xo-result won';  el.textContent='🏆 ¡Ganaste! +1 pt'; }
  else if(ST.gameStatus==='lost') { el.className='xo-result lost'; el.textContent='😢 Perdiste. 0 pts'; }
  else if(ST.gameStatus==='draw') { el.className='xo-result draw'; el.textContent='🤝 Empate. +0.5 pts'; }
}

// ─── SANITIZER ───
function san(s) {
  if(!s) return '';
  s=s.replace(/<[^>]*>/g,'');
  const m={'→':'->','←':'<-','↑':'^','↓':'v','"':'"','"':'"','\u2018':"'",'\u2019':"'",'–':'-','—':'-','…':'...'};
  s=s.replace(/[→←↑↓""''–—…]/g,c=>m[c]||c);
  return s.replace(/[^\x00-\xFF]/g,'');
}
