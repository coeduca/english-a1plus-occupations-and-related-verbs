  .pop-box {

    transition: transform 0.2s ease;
  }
  .pop-box:hover { transform: translateY(-3px); }
  .pop-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(#1a1a1a 10%, transparent 11%);
    background-size: 10px 10px; opacity: 0.05; pointer-events: none; border-radius: 10px;
  }
  
  .badge {
    position: absolute; top: -15px; left: -10px; background: var(--yellow);

    transform: rotate(-3deg); box-shadow: 3px 3px 0 var(--black); z-index: 2;

  .btn-alt { background: var(--secondary); color: var(--black); }

  @media (max-width: 850px) { .dropzone-container { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .dropzone-container { grid-template-columns: 1fr; } }
  
  .drop-row { display: flex; align-items: center; gap: 10px; background: #fff; padding: 12px; border: 2px solid var(--black); border-radius: 8px; box-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
  .dropzone {
    flex-grow: 1; min-width: 100px; height: 50px; border: 2px dashed var(--black); border-radius: 8px;

  select {

// Recalcula los puntos basados en las respuestas actuales para evitar exploits
function calculateScores() {
  let sc = { ex1:0, ex2:0, ex3:0, ex4:0, ex5:0, ex6:0, ex7:0, ex8:0, ex9:0 };
  
  sc.ex1 = state.answers.ex1.length; // Máx 8
  
  Object.keys(state.answers.ex2).forEach(k => {
    if(state.answers.ex2[k] === state.pool.emojiMatch[k].ans) sc.ex2++;
  });
  Object.keys(state.answers.ex3).forEach(k => {
    // Para Drag&Drop, se guardó el verbo en presente en ex3[k]. Hay que compararlo con el .p del verbo original en ese índice.
    if(state.answers.ex3[k] === state.pool.verbs[k].p) sc.ex3++;
  });
  Object.keys(state.answers.ex4).forEach(k => {
    if(state.answers.ex4[k] === state.pool.fill[k].ans) sc.ex4++;
  });
  Object.keys(state.answers.ex5).forEach(k => {
    if(state.answers.ex5[k] && state.answers.ex5[k].join(' ') === state.pool.reorder[k].ans) sc.ex5++;
  });
  Object.keys(state.answers.ex6).forEach(k => {
    if(state.answers.ex6[k] === state.pool.duties[k].ans) sc.ex6++;
  });
  Object.keys(state.answers.ex7).forEach(k => {
    if(state.answers.ex7[k] === state.pool.mcq[k].ans) sc.ex7++;
  });
  Object.keys(state.answers.ex8).forEach(k => {
    if(state.answers.ex8[k] === state.pool.tf[k].ans) sc.ex8++;
  });
  Object.keys(state.answers.ex9).forEach(k => {
    if(state.answers.ex9[k].toUpperCase() === state.pool.scramble[k].ans) sc.ex9++;
  });

  state.scores = sc;
}

// --- INITIALIZATION ---
window.addEventListener('DOMContentLoaded', () => {
  if (loadState() && state.s1) { showApp(); } 
  else { setTimeout(() => window.rigo.welcome(), 500); }

  document.getElementById('btn-add-partner').addEventListener('click', (e) => {
    e.target.style.display = 'none';
    document.getElementById('nie2').style.display = 'block';
  });

  document.getElementById('btn-login').addEventListener('click', () => {
    const n1 = document.getElementById('nie1').value.trim();
    const n2 = document.getElementById('nie2').value.trim();
    const err = document.getElementById('login-error');
    if(!STUDENTS[n1]) { err.style.display = 'block'; return; }
    
    state.s1 = Object.assign({nie: n1}, STUDENTS[n1]);
    if(n2 && STUDENTS[n2]) state.s2 = Object.assign({nie: n2}, STUDENTS[n2]);
    
    state.poolKey = Math.random() > 0.5 ? 'A' : 'B';
    saveState();
    
    window.rigo.setGrade(state.s1.grade);
    window.rigo.loginSuccess(state.s1.name);
    setTimeout(showApp, 2000);
  });
  
  document.getElementById('btn-pdf').addEventListener('click', generatePDF);
});

function showApp() {
  document.getElementById('login-modal').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  state.pool = POOLS[state.poolKey];
  window.rigo.setGrade(state.s1.grade);
  renderExercises();
  renderXO();
  updateTotal();
  if(state.gameStatus === 'pending') window.rigo.inviteGame();
}

function evaluate(ex, val, correct) {
  calculateScores(); // Recalculamos globalmente para prevenir bugs
  if(correct) {
    window.rigo.cheer();
  } else if (val !== "") { // Solo consolar si no fue limpiar una respuesta
    window.rigo.comfort();
  }
  saveState();
}

function setupSelects() {
  document.querySelectorAll('select').forEach(s => {
    s.addEventListener('change', (e) => {
      const ex = e.target.getAttribute('data-ex');
      const idx = parseInt(e.target.getAttribute('data-idx'));
      const val = e.target.value;
      state.answers[ex][idx] = val;
      
      let correct = false;
      if(ex === 'ex2') { correct = val === state.pool.emojiMatch[idx].ans; }
      if(ex === 'ex4') { correct = val === state.pool.fill[idx].ans; }
      if(ex === 'ex6') { correct = val === state.pool.duties[idx].ans; }
      if(ex === 'ex7') { correct = val === state.pool.mcq[idx].ans; }
      if(ex === 'ex8') { correct = val === state.pool.tf[idx].ans; }
      
      evaluate(ex, val, correct);
    });
  });
}

function setupInputs() {
  document.querySelectorAll('.scramble-input').forEach(inp => {
    inp.addEventListener('change', (e) => {
      const ex = e.target.getAttribute('data-ex');
      const idx = parseInt(e.target.getAttribute('data-idx'));
      const val = e.target.value.trim().toUpperCase();
      state.answers[ex][idx] = val;
      e.target.value = val;
      
      let correct = val === state.pool.scramble[idx].ans;
      evaluate(ex, val, correct);
    });
  });
}

// --- WORD SEARCH LOGIC ---
function setupWordSearch() {
  const grid = document.getElementById('ws-grid');
  let startCell = null;
  
  state.answers.ex1.forEach(wStr => {
    const wObj = state.pool.words.find(w => w.w === wStr);
    if(wObj) markCells(wObj.r1, wObj.c1, wObj.r2, wObj.c2);
  });

  function getCell(e) {
    if(e.touches) {
      const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      return el?.classList.contains('grid-cell') ? el : null;
    }
    return e.target.classList.contains('grid-cell') ? e.target : null;
  }

  function onStart(e) {
    if(e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT' || e.target.classList.contains('draggable')) return;
    const c = getCell(e);
    if(!c) return;
    e.preventDefault();
    startCell = {r: parseInt(c.dataset.r), c: parseInt(c.dataset.c)};
    c.classList.add('selected');
  }

  function onEnd(e) {
    document.querySelectorAll('.grid-cell.selected').forEach(el => el.classList.remove('selected'));
    if(!startCell) return;
    const c = getCell(e);
    if(!c) { startCell = null; return; }
    
    let r1 = startCell.r, c1 = startCell.c;
    let r2 = parseInt(c.dataset.r), c2 = parseInt(c.dataset.c);
    startCell = null;

    let foundW = state.pool.words.find(w => 
      (w.r1===r1 && w.c1===c1 && w.r2===r2 && w.c2===c2) ||
      (w.r1===r2 && w.c1===c2 && w.r2===r1 && w.c2===c1)
    );

    if(foundW && !state.answers.ex1.includes(foundW.w)) {
      state.answers.ex1.push(foundW.w);
      markCells(foundW.r1, foundW.c1, foundW.r2, foundW.c2);
      document.getElementById(`word-${foundW.w}`).classList.add('found');
      evaluate('ex1', foundW.w, true);
    }
  }

  grid.addEventListener('mousedown', onStart);
  grid.addEventListener('touchstart', onStart, {passive:false});
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);

  function markCells(r1, c1, r2, c2) {
    let dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1);
    let dist = Math.max(Math.abs(r2-r1), Math.abs(c2-c1));
    for(let i=0; i<=dist; i++) {
      let r = r1 + dr*i, c = c1 + dc*i;
      let cell = document.querySelector(`.grid-cell[data-r="${r}"][data-c="${c}"]`);
      if(cell) cell.classList.add('found');
    }
  }
}

// --- DRAG & DROP LOGIC ---
function setupDragAndDrop() {
  let draggedEl = null;
  let offsetX = 0, offsetY = 0;
  let clone = null;
  let isReorder = false;

  function onStart(e) {
    if(!e.target.classList.contains('draggable')) return;
    e.preventDefault();
    draggedEl = e.target;
    isReorder = draggedEl.classList.contains('reorder-drag');
    const rect = draggedEl.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    clone = draggedEl.cloneNode(true);
    clone.style.position = 'fixed';
    clone.style.left = rect.left + 'px';
    clone.style.top = rect.top + 'px';
    clone.style.pointerEvents = 'none';
    clone.style.opacity = '0.9';
    clone.style.transform = 'scale(1.1) rotate(-2deg)';
    clone.style.zIndex = '99999';
    document.body.appendChild(clone);
    draggedEl.style.opacity = '0';
  }

  function onMove(e) {
    if(!clone) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    clone.style.left = (clientX - offsetX) + 'px';
    clone.style.top = (clientY - offsetY) + 'px';

    if(clientY < 90) window.scrollBy(0, -15);
    else if(window.innerHeight - clientY < 90) window.scrollBy(0, 15);
  }

  function onEnd(e) {
    if(!clone) return;
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    clone.remove();
    clone = null;
    draggedEl.style.opacity = '1';

    draggedEl.style.display = 'none';
    let dropTarget = document.elementFromPoint(clientX, clientY);
    draggedEl.style.display = '';

    if(isReorder) {
      let zone = dropTarget?.closest('.reorder-zone');
      let src = dropTarget?.closest('.reorder-src');
      let idx = draggedEl.closest('[data-idx]').getAttribute('data-idx');
      
      if(zone && zone.getAttribute('data-idx') === idx) {
        zone.appendChild(draggedEl);
      } else if(src && src.getAttribute('data-idx') === idx) {
        src.appendChild(draggedEl);
      } else {
        document.querySelector(`.reorder-src[data-idx="${idx}"]`).appendChild(draggedEl);
      }
      
      let currentWords = Array.from(document.querySelector(`.reorder-zone[data-idx="${idx}"]`).children).map(c => c.getAttribute('data-val'));
      state.answers.ex5[idx] = currentWords;
      let ansStr = currentWords.join(' ');
      evaluate('ex5', ansStr, ansStr === state.pool.reorder[idx].ans);

    } else {
      let zone = dropTarget?.closest('.dropzone');
      if(zone && !zone.classList.contains('filled')) {
        let val = draggedEl.getAttribute('data-val');
        let idx = zone.getAttribute('data-idx');
        let correctAns = zone.getAttribute('data-ans');
        
        zone.innerHTML = `<span>${val}</span>`;
        zone.classList.add('filled');
        draggedEl.remove();
        
        state.answers.ex3[idx] = val;
        evaluate('ex3', val, val === correctAns); 
      }
    }
    draggedEl = null;
  }

  document.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onEnd);
}

// --- XO GAME LOGIC ---
function renderXO() {
  const board = document.getElementById('xo-board');
  board.innerHTML = '';
  state.xo.forEach((c, i) => {
    let cell = document.createElement('div');
    cell.className = 'xo-cell';
    cell.textContent = c;
    if(c==='X') cell.style.color = 'var(--primary)';
    if(c==='O') cell.style.color = 'var(--secondary)';
    cell.addEventListener('click', () => playXO(i));
    board.appendChild(cell);
  });
  updateXOResult();
}

function playXO(idx) {
  if(state.gameStatus !== 'pending' || state.xo[idx] !== '') return;
  state.xo[idx] = 'X';
  if(!checkXO()) setTimeout(botXO, 500);
  renderXO();
  saveState();
}

function botXO() {
  let empty = state.xo.map((c,i)=>c===''?i:null).filter(i=>i!==null);
  if(empty.length > 0) {
    let pick = empty[Math.floor(Math.random()*empty.length)];
    state.xo[pick] = 'O';
    checkXO();
    renderXO();
    saveState();
  }
}

function checkXO() {
  const lines = [ [0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6] ];
  for(let l of lines) {
    if(state.xo[l[0]] && state.xo[l[0]] === state.xo[l[1]] && state.xo[l[0]] === state.xo[l[2]]) {
      if(state.xo[l[0]] === 'X') {
        state.gameStatus = 'won'; state.gamePoints = 1;
        window.rigo.setEmotion('excited'); window.rigo.say("Felicidades, eres bueno en este juego, ten 1 punto extra", 5000);
      } else {
        state.gameStatus = 'lost'; state.gamePoints = 0;
        window.rigo.setEmotion('sad'); window.rigo.say("Oops, más suerte para la próxima.", 5000);
      }
      return true;
    }
  }
  if(!state.xo.includes('')) {
    state.gameStatus = 'draw'; state.gamePoints = 0.5;
    window.rigo.setEmotion('neutral'); window.rigo.say("Estamos a mano, ten 0.5 extra para tu nota", 5000);
    return true;
  }
  return false;
}

function updateXOResult() {
  const res = document.getElementById('xo-result');
  if(state.gameStatus === 'won') res.innerHTML = "¡Ganaste! +1 pt";
  else if(state.gameStatus === 'lost') res.innerHTML = "Perdiste. 0 pts";
  else if(state.gameStatus === 'draw') res.innerHTML = "Empate. +0.5 pts";
}

function updateTotal() {
  calculateScores(); // Asegurarnos de tener los scores reales antes de sumar
  const sum = Object.values(state.scores).reduce((a,b)=>a+b, 0);
  document.getElementById('total-score').textContent = sum;
}

// --- PDF GENERATION PREMIUM ---
function sanitize(str) {
  if(!str) return '';
  str = str.replace(/<[^>]*>?/gm, '');
  const map = { '→':'->', '←':'<-', '↑':'^', '↓':'v', '“':'"', '”':'"', '‘':"'", '’':"'", '–':'-', '—':'-', '…':'...' };
  str = str.replace(/[→←↑↓“”‘’–—…]/g, m => map[m]);
  return str.replace(/[^\x00-\xFF]/g, ''); 
}

  // Datos del Estudiante
  let y = 45;

  doc.setFont("helvetica", "bold"); doc.text(`Nivel:`, 20, y); doc.setFont("helvetica", "normal"); doc.text(`Inglés A1+`, 35, y);
  doc.setFont("helvetica", "bold"); doc.text(`Grado:`, 110, y); doc.setFont("helvetica", "normal"); doc.text(`${sanitize(state.s1.grade)}`, 125, y); y += 8;
  
  doc.setFont("helvetica", "bold"); doc.text(`Estudiante:`, 20, y); doc.setFont("helvetica", "normal"); doc.text(`${sanitize(state.s1.name)} (NIE: ${state.s1.nie})`, 45, y); y += 8;
  
  if(state.s2) {
    doc.setFont("helvetica", "bold"); doc.text(`Compañero:`, 20, y); doc.setFont("helvetica", "normal"); doc.text(`${sanitize(state.s2.name)} (NIE: ${state.s2.nie})`, 45, y); y += 8;
  }
  
  doc.setFont("helvetica", "bold"); doc.text(`Fecha:`, 20, y); doc.setFont("helvetica", "normal"); doc.text(`${new Date().toLocaleDateString()}`, 35, y); y += 12;

  // Calculo de Notas
  const correct = Object.values(state.scores).reduce((a,b)=>a+b, 0);
  const note = ((correct / TOTAL_MAX_POINTS) * 10) + state.gamePoints;

  // Cuadro de Calificación Destacado
  doc.setDrawColor(255, 51, 102); // Var(--primary)
  doc.setLineWidth(1);
  doc.setFillColor(255, 240, 245);
  doc.roundedRect(140, 42, 55, 30, 3, 3, 'FD');
  doc.setTextColor(255, 51, 102);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.text(`Aciertos: ${correct} / ${TOTAL_MAX_POINTS}`, 145, 50);
  doc.text(`Bonus Game: +${state.gamePoints}`, 145, 58);
  doc.setFontSize(14);
  doc.text(`Nota: ${note.toFixed(2)}`, 145, 68);
  
  y += 5;
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(14);
  doc.text("Detalle de Puntuación:", 20, y); 
  y += 6;

  // Tabla usando autoTable
  doc.autoTable({
    startY: y,
    head: [['Ejercicio', 'Descripción', 'Puntaje']],
    body: [
      ['Exercise 1', 'Word Search', `${state.scores.ex1} / 8`],
      ['Exercise 2', 'Emoji Match', `${state.scores.ex2} / 6`],
      ['Exercise 3', 'Present to Past (Drag & Drop)', `${state.scores.ex3} / 9`],
      ['Exercise 4', 'Fill in the blanks', `${state.scores.ex4} / 5`],
      ['Exercise 5', 'Reorder Sentences', `${state.scores.ex5} / 4`],
      ['Exercise 6', 'What did they do?', `${state.scores.ex6} / 5`],
      ['Exercise 7', 'Multiple Choice', `${state.scores.ex7} / 5`],
      ['Exercise 8', 'Reading (True or False)', `${state.scores.ex8} / 5`],
      ['Exercise 9', 'Word Scramble', `${state.scores.ex9} / 5`]
    ],
    theme: 'grid',
    headStyles: { fillColor: [78, 205, 196], textColor: [255, 255, 255], fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [244, 244, 240] },
    margin: { left: 20, right: 20 }
  });

  // Descarga del PDF
  const blob = doc.output('blob');
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Worksheet_${state.s1.nie}.pdf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}
</script>
</body>
</html>
